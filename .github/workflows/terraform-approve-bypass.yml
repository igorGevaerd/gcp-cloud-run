name: Terraform Approval Bypass

# Auto-passes the "terraform / approval" required status check on PRs
# that contain no terraform/ changes — so non-terraform PRs are never
# blocked waiting for a manual /approve.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  bypass:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read

    steps:
      - name: Check for terraform changes
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const hasTerraformChanges = files.some(f => f.filename.startsWith('terraform/'));
            return hasTerraformChanges;
          result-encoding: string

      - name: Auto-pass approval for non-terraform PRs
        if: steps.check.outputs.result == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'terraform / approval',
              description: 'No terraform changes — approval not required',
            });

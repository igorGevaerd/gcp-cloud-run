name: Terraform CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'terraform/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      id-token: write

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.4'

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Init (with backend)
        run: terraform init -reconfigure

      - name: Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: |
          terraform plan -no-color \
            -var="project_id=${{ secrets.TF_VAR_PROJECT_ID }}" \
            -var="region=${{ vars.TF_VAR_REGION || 'us-central1' }}" \
          2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... output truncated ...'
              : plan;
            const exitcode = '${{ steps.plan.outputs.exitcode }}';
            const status = exitcode === '0' ? '✅ Success' : '❌ Failed';

            const body = `### Terraform Plan ${status}

            <details><summary>Show plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

      - name: Set approval status to pending
        if: steps.plan.outputs.exitcode == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'terraform / approval',
              description: 'Comment /approve on the PR to proceed',
            });

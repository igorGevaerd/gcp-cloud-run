name: Terraform Plan Approve

on:
  issue_comment:
    types: [created]

jobs:
  approve:
    if: ${{ github.event.issue.pull_request != null && github.event.comment.user.login == 'igorGevaerd' && contains(github.event.comment.body, '/approve') }}
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read

    steps:
      - name: Get PR head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            return pr.data.head.sha;
          result-encoding: string

      - name: Set approval status to success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.result }}',
              state: 'success',
              context: 'terraform / approval',
              description: 'Approved by ${{ github.event.comment.user.login }}',
            });

name: Terraform Plan Approve

on:
  issue_comment:
    types: [created]

jobs:
  approve:
    if: ${{ github.event.issue.pull_request != null && github.event.comment.user.login == 'igorGevaerd' && contains(github.event.comment.body, '/approve') }}
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read

    steps:
      - name: Get PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const hasTerraformChanges = files.some(f => f.filename.startsWith('terraform/'));

            return JSON.stringify({ sha: pr.data.head.sha, hasTerraformChanges });
          result-encoding: string

      - name: Set approval status to success
        if: ${{ fromJson(steps.pr.outputs.result).hasTerraformChanges }}
        uses: actions/github-script@v7
        with:
          script: |
            const { sha } = ${{ steps.pr.outputs.result }};
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'success',
              context: 'terraform / approval',
              description: 'Approved by ${{ github.event.comment.user.login }}',
            });

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.TF_VAR_PROJECT_ID }}
  REGION: ${{ vars.TF_VAR_REGION }}
  SERVICE_NAME: gcp-cloud-run
  IMAGE: ${{ vars.TF_VAR_REGION }}-docker.pkg.dev/${{ secrets.TF_VAR_PROJECT_ID }}/gcp-cloud-run/gcp-cloud-run

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.4'

      - name: Init
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Apply
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.TF_VAR_PROJECT_ID }}" \
            -var="region=${{ vars.TF_VAR_REGION }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

  build-push:
    name: Build & Push
    needs: terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.TF_VAR_REGION }}-docker.pkg.dev --quiet

      - name: Build
        run: |
          docker build \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .

      - name: Push
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Set image output
        id: set-image
        run: echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Cloud Run
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ vars.TF_VAR_REGION }}
          image: ${{ needs.build-push.outputs.image }}

      - name: Print service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

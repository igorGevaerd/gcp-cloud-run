name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.TF_VAR_PROJECT_ID }}
  REGION: ${{ vars.TF_VAR_REGION }}
  SERVICE_NAME: gcp-cloud-run
  IMAGE: ${{ vars.TF_VAR_REGION }}-docker.pkg.dev/${{ secrets.TF_VAR_PROJECT_ID }}/gcp-cloud-run/gcp-cloud-run

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.4'

      - name: Init
        run: terraform init

      - name: Apply
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.TF_VAR_PROJECT_ID }}" \
            -var="region=${{ vars.TF_VAR_REGION }}"

  build-push:
    name: Build & Push
    needs: terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.TF_VAR_REGION }}-docker.pkg.dev --quiet

      - name: Build
        run: |
          docker build \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .

      - name: Push
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    name: Deploy to Cloud Run
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ vars.TF_VAR_REGION }}
          image: ${{ vars.TF_VAR_REGION }}-docker.pkg.dev/${{ secrets.TF_VAR_PROJECT_ID }}/gcp-cloud-run/gcp-cloud-run:${{ github.sha }}

      - name: Print service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

  e2e:
    name: E2E Tests
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.4'
          terraform_wrapper: false

      - name: Init
        run: terraform init

      - name: Run E2E tests
        run: |
          GATEWAY_URL=$(terraform output -raw gateway_url)
          API_KEY=$(terraform output -raw api_key)
          echo "::add-mask::$API_KEY"

          echo "--- Open routes ---"
          curl -sf "$GATEWAY_URL/" > /dev/null
          curl -sf "$GATEWAY_URL/health" | grep '"status":"ok"'

          echo "--- Protected routes with valid key ---"
          curl -sf -H "x-api-key: $API_KEY" "$GATEWAY_URL/random-int" | grep '"value"'
          curl -sf -H "x-api-key: $API_KEY" "$GATEWAY_URL/random-name-string" | grep '"name"'

          echo "--- Protected routes without key (expect 401) ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GATEWAY_URL/random-int")
          [ "$STATUS" = "401" ] || (echo "Expected 401 but got $STATUS" && exit 1)

          echo "All E2E tests passed!"

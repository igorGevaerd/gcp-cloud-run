name: Code Review (Reviewdog)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  reviewdog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Unit tests
        run: npm test

      - uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: 'src/**/*.ts'

      - name: Type check
        run: npx tsc --noEmit

      - name: Prettier check
        run: npx prettier --check 'src/**/*.ts'
